<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!-- ============================= -->
  <!-- META / SEO -->
  <!-- ============================= -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Playlists por categoria - MusicBox">
  <title>MusicBox | Playlists</title>

  <!-- ============================= -->
  <!-- FAVICON -->
  <!-- ============================= -->
  <link rel="icon" href="assets/img/Logo vibrante da MusicBox (1).png">

  <!-- ============================= -->
  <!-- CSS: Bootstrap / AOS / Ícones / Estilos do site -->
  <!-- ============================= -->
  <!-- Bootstrap 5.3.8 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- AOS -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- CSS (o MESMO do site) -->
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="bg-dark text-white">

  <!-- ============================= -->
  <!-- NAVBAR -->
  <!-- ============================= -->
  <!-- NAVBAR (mesmo padrão, sem Galeria) -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
        <img src="assets/img/Logo vibrante da MusicBox.png" width="160" alt="Logo MusicBox">
        <span></span>
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
       

        </ul>
      </div>
    </div>
  </nav>

  <!-- ============================= -->
  <!-- BANNER -->
  <!-- ============================= -->
  <!-- BANNER (igual estilo das outras) -->
  <section class="banner-interno bg-dark text-white text-center py-5">
    <div class="container" data-aos="fade-up">
      <h1>Playlists MusicBox</h1>
      <p>Organize por categoria e toque suas músicas</p>
    </div>
  </section>

  <!-- ============================= -->
  <!-- CONTEÚDO (filtros + container das playlists via JS) -->
  <!-- ============================= -->
  <!-- CONTEÚDO -->
  <section class="py-5">
    <div class="container">

      <!-- Botões de filtro (mesmo visual do site) -->
      <div class="text-center mb-4" data-aos="fade-up">
        <button class="btn btn-outline-light me-2 filter-btn active" data-category="all">Todas</button>
        <button class="btn btn-outline-light me-2 filter-btn" data-category="Pop">Pop</button>
        <button class="btn btn-outline-light me-2 filter-btn" data-category="Rock">Rock</button>
        <button class="btn btn-outline-light filter-btn" data-category="MPB">MPB</button>
      </div>

      <!-- Área onde o JS vai inserir as playlists -->
      <div class="row g-4" id="playlistContainer"></div>

      <!-- ✅ ADICIONADO: espaço pro player fixo não cobrir conteúdo -->
      <div style="height: 110px;"></div>

    </div>
  </section>

  <!-- ============================= -->
  <!-- PLAYER GLOBAL (fixo) -->
  <!-- ============================= -->
  <!-- ✅ ADICIONADO: PLAYER GLOBAL FIXO (minimalista) -->
  <div class="global-player" aria-label="Player global MusicBox">
    <div class="container">
      <div class="gp-wrap">
        <button class="gp-play" id="gpPlay" type="button" aria-label="Play/Pause">
          <i class="fa-solid fa-play"></i>
        </button>

        <div class="gp-title" id="gpTitle">Nenhuma música</div>

        <div class="gp-time" id="gpTime">0:00 / 0:00</div>

        <input class="gp-seek" id="gpSeek" type="range" min="0" max="100" value="0" aria-label="Progresso">

        <div class="gp-volwrap" title="Volume">
          <i class="fa-solid fa-volume-low" aria-hidden="true"></i>
          <input class="gp-vol" id="gpVol" type="range" min="0" max="1" step="0.01" value="0.8" aria-label="Volume">
        </div>

        <audio id="gpAudio" preload="metadata"></audio>
      </div>
    </div>
  </div>

  <!-- ============================= -->
  <!-- FOOTER -->
  <!-- ============================= -->
<footer class="bg-dark text-white text-center py-4">
<div class="container">
<p class="mb-0">© 2026 MusicBox - Todos os direitos reservados</p>
</div>
</footer>

  <!-- ============================= -->
  <!-- SCRIPTS -->
  <!-- ============================= -->
  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script>
    AOS.init({ duration: 1000, once: true });
  </script>

  <!-- JS global do site (mantém navbar active, etc) -->
  <script src="assets/js/script.js"></script>

  <!-- JS das playlists -->
  <script src="js/playlists.js"></script>
</body>
</html>
