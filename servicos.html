<!-- CONTEÚDO (cards com embeds do Spotify) -->

    <div class="row g-4">

            </iframe>
          </div>
        </div>
      </div>

      <div class="col-md-6" data-aos="fade-up" data-aos-delay="200">
        <div class="card shadow">
          <div class="card-body">
            <h5 class="card-title">O Que Falta Em Você</h5>
            <p>Marília Mendonça</p>
            <iframe style="border-radius:12px"
              src="https://open.spotify.com/embed/track/3XSefjiSHsD34F7clH84xa"
              width="100%" height="152"
              allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
            </iframe>
          </div>
        </div>
      </div>

    </div>

    <!-- SEGUNDA LINHA (NOVAS MÚSICAS) -->
    <div class="row g-4 mt-2">

      <div class="col-md-6" data-aos="fade-up">
        <div class="card shadow">
          <div class="card-body">

              width="100%" height="152"
              allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
            </iframe>
          </div>
        </div>
      </div>

      <div class="col-md-6" data-aos="fade-up" data-aos-delay="200">
        <div class="card shadow">
          <div class="card-body">
            <h5 class="card-title">Believer</h5>
            <p>Imagine Dragons</p>
            <iframe style="border-radius:12px"
              src="https://open.spotify.com/embed/track/0pqnGHJpmpxLKifKRmU6WP"
              width="100%" height="152"
              allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">

      </div>

  </div>

<!-- ============================= -->
<!-- PLAYER GLOBAL (fixo) -->
<!-- ============================= -->
<!-- PLAYER GLOBAL -->
<div class="global-player">
  <div class="container">
    <div class="gp-wrap">

      <!-- titulo da musica -->
      <div id="gpTitle" class="gp-title">
        Selecione uma música
      </div>

      <!-- botão play -->
      <button id="gpPlay" class="gp-play">
        <i class="fa-solid fa-play"></i>
      </button>

      <!-- barra de progresso -->
      <input
        id="gpSeek"
        class="gp-seek"
        type="range"
        min="0"
        max="100"
        value="0"
      >

      <!-- tempo -->
      <div id="gpTime" class="gp-time">
        0:00 / 0:00
      </div>

      <!-- volume -->
      <div class="gp-volwrap">
        <i class="fa-solid fa-volume-low"></i>

        <input
          id="gpVol"
          class="gp-vol"
          type="range"
          min="0"
          max="1"
          step="0.01"
          value="0.8"
        >
      </div>

      <!-- audio -->
      <audio id="gpAudio"></audio>

    </div>
  </div>
</div>
